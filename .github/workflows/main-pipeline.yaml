name: NetSentinel Complete Enterprise Pipeline Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # JOB 1: Core Backend & Security Ingestion Checks
  backend-ci:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-with-version: '3.10'
    - name: Install Backend Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
    - name: Run Code Quality Checks
      run: |
        # Validates Python code syntax integrity
        python -m py_compile backend/app/main.py

  # JOB 2: Unsupervised AI Core Vectorizer Validation
  ai-engine-validation:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Verify Model Ingestion Vectors
      run: |
        python -m pip install --upgrade pip
        if [ -f ai_engine/requirements.txt ]; then pip install -r ai_engine/requirements.txt; fi
        python -m py_compile ai_engine/main.py

  # JOB 3: React Dashboard & D3.js Workspace Compilation
  frontend-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Node.js
      uses: actions/setup-python@v3
      with:
        node-version: '18'
    - name: Compile and Test Production Build
      run: |
        cd frontend
        npm install
        # Verifies the React DOM and D3 assets compile cleanly without warnings
        npm run build --if-present
